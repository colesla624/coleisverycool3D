<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Unicorn Strike: Force Start</title>
    <style>
        body { margin: 0; overflow: hidden; background: #050005; font-family: 'Courier New', monospace; }
        #ui { position: absolute; top: 20px; left: 20px; color: #0ff; pointer-events: none; z-index: 5; }
        #crosshair { position: absolute; top: 50%; left: 50%; width: 12px; height: 12px; border: 2px solid #f0f; border-radius: 50%; transform: translate(-50%, -50%); pointer-events: none; }
        
        #overlay {
            position: absolute; width: 100%; height: 100%; background: #000;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            color: white; z-index: 100; text-align: center;
        }

        #timer { font-size: 10em; color: #f0f; text-shadow: 0 0 20px #f0f; }
        .glitch { animation: flash 0.5s infinite; color: #0ff; }
        @keyframes flash { 0% { opacity: 1; } 50% { opacity: 0.2; } }
    </style>
</head>
<body onclick="forceStart()" onkeydown="forceStart()">
    <div id="overlay">
        <h1 style="letter-spacing: 10px;">SYSTEM INITIALIZING</h1>
        <div id="timer">5</div>
        <p class="glitch">CLICK ANYWHERE TO SYNC NEURAL LINK</p>
    </div>

    <div id="ui">
        <h2 style="margin:0">THREATS ELIMINATED: <span id="score">0</span></h2>
    </div>
    <div id="crosshair"></div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "cannon": "https://unpkg.com/cannon-es@0.20.0/dist/cannon-es.js"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import * as CANNON from 'cannon';

        let gameActive = false;
        let score = 0;
        let timeLeft = 5;

        // --- Auto-Start Logic ---
        const timerEl = document.getElementById('timer');
        const countdown = setInterval(() => {
            timeLeft--;
            timerEl.innerText = timeLeft;
            if (timeLeft <= 0) {
                clearInterval(countdown);
                timerEl.innerText = "READY";
            }
        }, 1000);

        // This function attempts to hijack the mouse as soon as the user touches anything
        window.forceStart = function() {
            if (timeLeft <= 0) {
                document.body.requestPointerLock();
            }
        };

        // --- Scene Setup ---
        const scene = new THREE.Scene();
        scene.fog = new THREE.FogExp2(0x050005, 0.1);
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        const world = new CANNON.World({ gravity: new CANNON.Vec3(0, -25, 0) });
        const clock = new THREE.Clock();

        // Environment
        scene.add(new THREE.GridHelper(200, 50, 0xff00ff, 0x110022));
        const light = new THREE.PointLight(0x00ffff, 100, 40);
        scene.add(light, new THREE.AmbientLight(0xffffff, 0.2));

        const groundBody = new CANNON.Body({ mass: 0, shape: new CANNON.Plane() });
        groundBody.quaternion.setFromEuler(-Math.PI / 2, 0, 0);
        world.addBody(groundBody);

        // --- Unicorn Weapon ---
        const uniGroup = new THREE.Group();
        const uniBody = new THREE.Mesh(new THREE.BoxGeometry(0.2, 0.3, 0.8), new THREE.MeshStandardMaterial({color: 0xffffff}));
        const horn = new THREE.Mesh(new THREE.ConeGeometry(0.07, 0.6), new THREE.MeshStandardMaterial({color: 0xffd700, emissive: 0xffd700}));
        horn.rotation.x = Math.PI/2; horn.position.z = 0.7;
        uniGroup.add(uniBody, horn);
        scene.add(uniGroup);

        // --- Alien AI Ragdoll ---
        class Alien {
            constructor(x, z) {
                this.mesh = new THREE.Mesh(new THREE.CapsuleGeometry(0.5, 1, 4, 8), new THREE.MeshStandardMaterial({color: 0x00ff00}));
                scene.add(this.mesh);
                this.body = new CANNON.Body({ mass: 5, shape: new CANNON.Capsule(0.5, 1), position: new CANNON.Vec3(x, 2, z) });
                this.body.angularDamping = 0.9;
                world.addBody(this.body);
            }
            update() {
                // Active Ragdoll: Stand up
                this.body.applyForce(new CANNON.Vec3(0, 120, 0), this.body.position);
                
                // AI Logic: Walk toward player
                const dir = new CANNON.Vec3(
                    camera.position.x - this.body.position.x,
                    0,
                    camera.position.z - this.body.position.z
                );
                dir.normalize();
                this.body.velocity.x = dir.x * 3;
                this.body.velocity.z = dir.z * 3;

                this.mesh.position.copy(this.body.position);
                this.mesh.quaternion.copy(this.body.quaternion);
                if (this.body.position.y < -10) this.body.position.set(Math.random()*40-20, 10, Math.random()*-40-10);
            }
        }

        let aliens = Array.from({length: 10}, () => new Alien(Math.random()*30-15, -20));

        // --- Logic ---
        const keys = {};
        let yaw = 0, pitch = 0, swing = 0;

        document.addEventListener('pointerlockchange', () => {
            gameActive = (document.pointerLockElement === document.body);
            document.getElementById('overlay').style.display = gameActive ? 'none' : 'flex';
        });

        window.addEventListener('keydown', e => keys[e.code] = true);
        window.addEventListener('keyup', e => keys[e.code] = false);
        window.addEventListener('mousemove', e => { if(gameActive){ yaw -= e.movementX*0.002; pitch -= e.movementY*0.002; } });
        window.addEventListener('mousedown', () => { if(gameActive && swing === 0) swing = 0.1; });

        function animate() {
            requestAnimationFrame(animate);
            if(!gameActive) return;

            world.step(1/60);
            camera.rotation.set(pitch, yaw, 0, 'YXZ');
            
            // Movement
            const move = new THREE.Vector3();
            if(keys['KeyW']) move.z -= 0.15; if(keys['KeyS']) move.z += 0.15;
            if(keys['KeyA']) move.x -= 0.15; if(keys['KeyD']) move.x += 0.15;
            move.applyQuaternion(camera.quaternion);
            camera.position.add(move);
            camera.position.y = 2;

            // Unicorn Swing
            uniGroup.position.copy(camera.position);
            uniGroup.rotation.copy(camera.rotation);
            uniGroup.translateZ(-1); uniGroup.translateX(0.6); uniGroup.translateY(-0.4);

            if(swing > 0) {
                uniGroup.rotation.x += Math.sin(swing * Math.PI) * 4;
                swing += 0.15;
                if(swing >= 1) {
                    swing = 0;
                    aliens.forEach(a => {
                        if(uniGroup.position.distanceTo(a.mesh.position) < 3) {
                            a.body.applyImpulse(new CANNON.Vec3(-Math.sin(yaw)*100, 50, -Math.cos(yaw)*100), a.body.position);
                            score++; document.getElementById('score').innerText = score;
                        }
                    });
                }
            }
            aliens.forEach(a => a.update());
            renderer.render(scene, camera);
        }
        animate();
    </script>
</body>
</html>
